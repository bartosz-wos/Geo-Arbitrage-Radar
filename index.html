<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Geo Arbitrage Radar MVP</title>

  <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css" rel="stylesheet" />

  <link href="frontend/style.css" rel="stylesheet" />
</head>
<body>

  <div id="ui-panel" class="panel">
    <div class="panel-header" onclick="togglePanel('ui-content', 'ui-arrow')">
      <h2>Settings</h2>
      <span id="ui-arrow">▼</span>
    </div>
    <div id="ui-content" class="panel-content">
      <p style="margin-top: 15px;">Offer count: <span id="offer-count" style="color:white;">0</span></p>

      <div class="slider-container">
        <label>Analysis Radius</label>
        <span class="value-display" id="radius-val">2.0 km</span>
        <input type="range" id="radius-slider" min="0.5" max="5.0" step="0.5" value="2.0">
      </div>

      <div class="slider-container">
        <label>Arbitrage Threshold</label>
        <span class="value-display" id="threshold-val">20 %</span>
        <input type="range" id="threshold-slider" min="5" max="50" step="5" value="20">
      </div>

      <div style="margin-top: 20px; border-top: 1px solid rgba(0,255,204,0.3); padding-top: 15px;">
        <label style="display: block; margin-bottom: 8px; cursor: pointer;">
          <input type="checkbox" id="toggle-hex" checked style="accent-color: #00ffcc;"> Show Heatmap
        </label>
        <label style="display: block; margin-bottom: 8px; cursor: pointer;">
          <input type="checkbox" id="toggle-dots" checked style="accent-color: #ff003c;"> Show deals
        </label>
        <label style="display: block; cursor: pointer;">
          <input type="checkbox" id="toggle-all-offers" style="accent-color: #00ffcc;"> Show all offers
        </label>
      </div>
    </div>
  </div>

  <div id="deals-panel" class="panel">
    <div class="panel-header" onclick="togglePanel('deals-content', 'deals-arrow')">
      <h2>TOP 5 Offers</h2>
      <span id="deals-arrow">▼</span>
    </div>
    <div id="deals-content" class="panel-content hidden">
      <ul id="deals-list">
        <li style="color: #aaa;">Use sliders to find offers...</li>
      </ul>
    </div>
  </div>

  <div id="tooltip" class="hidden"></div>

  <button id="fly-home-btn" onclick="flyHome()">Center the map</button>

  <div id="map"></div>

  <script src="frontend/app.js"></script>

</body>
</html>
